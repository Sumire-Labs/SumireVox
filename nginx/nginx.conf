server {
    listen 80;
    server_name sumirevox.com;

    resolver 127.0.0.11 valid=10s;
    set $api_backend http://api:3000;
    set $web_backend http://web:80;

    location /api/ {
        proxy_pass $api_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass $api_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Stripe Webhook: バッファリング無効でそのままAPI転送
    location /api/stripe/webhook {
        proxy_pass $api_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # Web フロントエンド (SPA fallback はweb コンテナ側で処理)
    location / {
        proxy_pass $web_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 80;
    server_name admin.sumirevox.com;

    resolver 127.0.0.11 valid=10s;
    set $api_backend http://api:3000;
    set $admin_backend http://admin:80;


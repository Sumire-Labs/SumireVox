name: Deploy to Cloudflare Pages
on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'packages/**'
      - '.github/workflows/cloudflare-pages.yml'
jobs:
  deploy-web:
    name: Deploy Web to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
        env:
          PRISMA_SKIP_POSTINSTALL_GENERATE: true
      - name: Generate Prisma Client
        run: pnpm --filter @sumirevox/bot exec prisma generate
      - name: Build shared
        run: pnpm --filter @sumirevox/shared build
      - name: Build Web
        run: pnpm --filter @sumirevox/web build
        env:
          VITE_API_URL: https://api.sumirevox.com
          VITE_BOT_INVITE_URL: ${{ vars.VITE_BOT_INVITE_URL }}
          VITE_DISCORD_SUPPORT_URL: ${{ vars.VITE_DISCORD_SUPPORT_URL }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=sumirevox-web
  deploy-admin:
    name: Deploy Admin to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
        env:
          PRISMA_SKIP_POSTINSTALL_GENERATE: true
      - name: Generate Prisma Client
        run: pnpm --filter @sumirevox/bot exec prisma generate
      - name: Build shared
        run: pnpm --filter @sumirevox/shared build
      - name: Build Admin
        run: pnpm --filter @sumirevox/admin build
        env:
          VITE_API_URL: https://api.sumirevox.com
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/admin/dist --project-name=sumirevox-admin

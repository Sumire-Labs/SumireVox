services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: sumirevox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: sumirevox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sumirevox"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  voicevox:
    image: voicevox/voicevox_engine:nvidia-latest
    ports:
      - "50021:50021"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:50021/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  # --- Migration (一度だけ実行して終了) ---
  migrate:
    profiles: ["production"]
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgresql://sumirevox:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/sumirevox
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # --- Applications ---
  bot:
    profiles: ["production"]
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
      target: runner
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      voicevox:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BOT_INSTANCE_ID: 1
      DATABASE_URL: postgresql://sumirevox:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/sumirevox
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      VOICEVOX_URLS: http://voicevox:50021
    restart: unless-stopped

  bot2:
    profiles: [ "production" ]
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
      target: runner
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      voicevox:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BOT_INSTANCE_ID: 2
      DATABASE_URL: postgresql://sumirevox:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/sumirevox
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      VOICEVOX_URLS: http://voicevox:50021
    restart: unless-stopped

  api:
    profiles: ["production"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://sumirevox:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/sumirevox
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
    restart: unless-stopped

  web:
    profiles: ["production"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    restart: unless-stopped

  admin:
    profiles: ["production"]
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: runner
    restart: unless-stopped

  nginx:
    profiles: ["production"]
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api
      - web
      - admin
    restart: unless-stopped

  certbot:
    profiles: ["production"]
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www:
